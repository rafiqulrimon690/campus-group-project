<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rimon Section</title>
  <!-- Google Font: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #ffffff;
      color: #1e1f38;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    /* Hero Layout */
    .hero-section {
      max-width: 1200px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 4rem;
    }

    /* Left Column Content */
    .hero-content {
      max-width: 540px;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #f3ebff;
      color: #7025ec;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 1.75rem;
    }

    .badge-dot {
      width: 10px;
      height: 10px;
      background-color: #8b3dff;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(139, 61, 255, 0.8);
    }

    /* Heading & Subtitle */
    .hero-title {
      font-size: 3.25rem;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: #1a1a2e;
      margin-bottom: 1.25rem;
    }

    .hero-description {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #686e7d;
      margin-bottom: 2rem;
    }

    /* Action Buttons */
    .hero-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 26px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8132ff 0%, #6b11ff 100%);
      color: #ffffff;
      border: none;
      box-shadow: 0 4px 14px rgba(107, 17, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(107, 17, 255, 0.4);
    }

    .btn-secondary {
      background-color: transparent;
      color: #6b11ff;
      border: 1.5px solid #a855f7;
    }

    .btn-secondary:hover {
      background-color: #f8f5ff;
      transform: translateY(-2px);
    }

    /* Right Column Image */
    .hero-image-container {
      width: 100%;
      display: flex;
      justify-content: flex-end;
    }

    .hero-image {
      width: 100%;
      max-width: 520px;
      height: auto;
      border-radius: 20px;
      object-fit: cover;
    }

    /* Responsive Design */
    @media (max-width: 992px) {
      .hero-section {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 3rem;
      }

      .hero-content {
        max-width: 100%;
        margin: 0 auto;
      }

      .hero-title {
        font-size: 2.5rem;
      }

      .hero-actions {
        justify-content: center;
      }

      .hero-image-container {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <section class="hero-section">
    <!-- Left Side: Content -->
    <div class="hero-content">
      <div class="badge">
        <span class="badge-dot"></span>
        <span>New: AI-Powered Tools Available</span>
      </div>

      <h1 class="hero-title">
        Supercharge Your Digital Workflow
      </h1>

      <p class="hero-description">
        Access premium AI tools, design assets, templates, and productivity software—all in one place. Start creating faster today.
      </p>

      <div class="hero-actions">
        <a href="#" class="btn btn-primary">Explore Products</a>
        <a href="#" class="btn btn-secondary">
          <svg width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1.5L13 8L1 14.5V1.5Z" stroke="#6b11ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Watch Demo
        </a>
      </div>
    </div>

    <!-- Right Side: Image -->
    <div class="hero-image-container">
      <img src="7_Top_Technical_Skills_to_Master_in_2021.avif" alt="AI Powered Digital Workflow" class="hero-image">
    </div>
  </section>

</body>
</html>
